        // ============================================================
        //  2. DOM 引用
        // ============================================================
        const faqListDom = document.getElementById("faqList");
        const chatTagListDom = document.getElementById("chatTagList");
        const searchInput = document.getElementById("searchInput");
        const chatWindow = document.getElementById("chatWindow");
        const openChatBtn = document.getElementById("openChatBtn");
        const closeChatBtn = document.getElementById("closeChatBtn");
        const pwdModal = document.getElementById("pwdModal");
        const closeModalBtn = document.getElementById("closeModalBtn");
        const chatContent = document.getElementById("chatContent");
        const qrcodeImg = document.getElementById("qrcodeImg");

        // ============================================================
        //  3. 渲染函数
        // ============================================================
        function renderFaq(list) {
            faqListDom.innerHTML = "";
            list.forEach(item => {
                const itemDom = document.createElement("div");
                itemDom.className = "faq-item";
                itemDom.dataset.id = item.id;

                const qDiv = document.createElement("div");
                qDiv.className = "faq-question";
                qDiv.innerHTML = `
                    <span>${item.question}</span>
                    <span class="arrow">▼</span>
                `;

                const aDiv = document.createElement("div");
                aDiv.className = "faq-answer";
                aDiv.innerHTML = `<div class="faq-answer-inner">${item.answer}</div>`;

                qDiv.addEventListener("click", function(e) {
                    // 切换 active 类
                    itemDom.classList.toggle("active");
                });

                itemDom.appendChild(qDiv);
                itemDom.appendChild(aDiv);
                faqListDom.appendChild(itemDom);
            });
        }

        function renderChatTags() {
            chatTagListDom.innerHTML = "";
            faqData.forEach(item => {
                const tag = document.createElement("span");
                tag.className = "chat-faq-tag";
                // 截取前 10 个字符作为标签显示，避免过长
                const short = item.question.length > 12 ? item.question.slice(0, 12) + "…" : item.question;
                tag.innerText = short;
                tag.title = item.question;
                tag.dataset.id = item.id;
                tag.addEventListener("click", function(e) {
                    e.stopPropagation();
                    sendBotMsg(item);
                });
                chatTagListDom.appendChild(tag);
            });
        }

        // ============================================================
        //  4. 聊天逻辑
        // ============================================================
        function sendBotMsg(faqItem) {
            // 检查是否已经存在相同问题的回复（避免重复）
            const existing = chatContent.querySelectorAll('.chat-msg-bot');
            let duplicate = false;
            // 简单去重：如果最后一条消息包含相同问题标题，则不再重复添加
            if (existing.length > 0) {
                const last = existing[existing.length - 1];
                if (last.innerText.includes(faqItem.question)) {
                    duplicate = true;
                }
            }
            if (duplicate) {
                // 如果重复，滚动到底部并轻微提示
                chatContent.scrollTop = chatContent.scrollHeight;
                return;
            }

            const msgDiv = document.createElement("div");
            msgDiv.className = "chat-msg-bot";
            msgDiv.innerHTML = `
                <strong>📌 ${faqItem.question}</strong>
                <div style="margin-top:8px;">${faqItem.answer}</div>
            `;
            chatContent.appendChild(msgDiv);
            chatContent.scrollTop = chatContent.scrollHeight;

            // 如果是「忘记密码」问题，自动弹出二维码弹窗
            if (faqItem.id === "faq-pwd") {
                setTimeout(() => {
                    pwdModal.style.display = "flex";
                }, 400);
            }
        }

        // ============================================================
        //  5. 搜索过滤
        // ============================================================
        searchInput.addEventListener("input", function(e) {
            const key = e.target.value.trim().toLowerCase();
            if (!key) {
                renderFaq(faqData);
                return;
            }
            const filtered = faqData.filter(item =>
                item.question.toLowerCase().includes(key) ||
                item.answer.toLowerCase().includes(key)
            );
            renderFaq(filtered);
        });

        // ============================================================
        //  6. 窗口 / 弹窗 控制
        // ============================================================
        openChatBtn.addEventListener("click", function() {
            chatWindow.style.display = "flex";
            // 滚动聊天区到底部
            chatContent.scrollTop = chatContent.scrollHeight;
        });

        closeChatBtn.addEventListener("click", function() {
            chatWindow.style.display = "none";
        });

        // 点击弹窗外关闭
        pwdModal.addEventListener("click", function(e) {
            if (e.target === pwdModal) {
                pwdModal.style.display = "none";
            }
        });

        closeModalBtn.addEventListener("click", function() {
            pwdModal.style.display = "none";
        });

        // ============================================================
        //  7. 初始化
        // ============================================================
        window.onload = function() {
            renderFaq(faqData);
            renderChatTags();

            // 二维码图片：请将 service-qr.png 放置于与 HTML 同目录下
            // 若图片不存在，可显示占位文字，但不影响功能
            qrcodeImg.src = "./service-qr.png";
            // 如果图片加载失败，显示友好占位
            qrcodeImg.onerror = function() {
                this.style.display = "none";
                const parent = this.parentNode;
                const placeholder = document.createElement("span");
                placeholder.style.color = "#999";
                placeholder.style.fontSize = "14px";
                placeholder.innerText = "请放置客服二维码图片\n(service-qr.png)";
                parent.appendChild(placeholder);
            };
        };

        // 键盘快捷键：ESC 关闭弹窗
        document.addEventListener("keydown", function(e) {
            if (e.key === "Escape") {
                if (pwdModal.style.display === "flex") {
                    pwdModal.style.display = "none";
                }
                if (chatWindow.style.display === "flex") {
                    chatWindow.style.display = "none";
                }
            }
        });
    </script>
