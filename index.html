        // ================================================================
        //  2. DOM 引用
        // ================================================================
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const quickContainer = document.getElementById('quickQuestions');

        // ================================================================
        //  3. 渲染快捷按钮（使用短标签，点击传递完整标题）
        // ================================================================
        faqs.forEach(faq => {
            const btn = document.createElement('button');
            btn.textContent = faq.shortLabel;
            btn.title = faq.title; // 悬停显示完整标题
            btn.addEventListener('click', () => handleUserMessage(faq.title));
            quickContainer.appendChild(btn);
        });

        // ================================================================
        //  4. 消息管理
        // ================================================================
        function addMessage(type, html) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = html;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'typing';
            div.id = 'typingIndicator';
            div.innerHTML = '<span></span><span></span><span></span>';
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function hideTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        // ================================================================
        //  5. 构建回答 HTML
        // ================================================================
        function buildAnswerHTML(faq) {
            return `<div class="answer-title">📌 ${faq.title}</div>
                    <div class="raw-html">${faq.answerHtml}</div>`;
        }

        // ================================================================
        //  6. 意图匹配（模糊搜索 + 权重）
        // ================================================================
        function matchFAQ(query) {
            if (!query || !query.trim()) return null;
            const q = query.trim().toLowerCase();
            let best = null;
            let bestScore = 0;

            faqs.forEach(faq => {
                let score = 0;
                faq.keywords.forEach(kw => {
                    const kwLower = kw.toLowerCase();
                    if (q.includes(kwLower)) {
                        score += kwLower.length * 3;
                    }
                    if (kwLower.includes(q) || q.includes(kwLower)) {
                        score += kwLower.length;
                    }
                });
                const titleLower = faq.title.toLowerCase();
                if (titleLower.includes(q)) {
                    score += q.length * 2;
                }
                if (score > bestScore) {
                    bestScore = score;
                    best = faq;
                }
            });

            return bestScore > 1 ? best : null;
        }

        // ================================================================
        //  7. 处理用户消息
        // ================================================================
        function handleUserMessage(text) {
            if (!text || !text.trim()) return;
            const query = text.trim();

            addMessage('user', query);
            userInput.value = '';

            showTyping();

            setTimeout(() => {
                hideTyping();
                const matched = matchFAQ(query);
                if (matched) {
                    addMessage('bot', buildAnswerHTML(matched));
                } else {
                    addMessage('bot', `
                        <div class="no-match">🙇 抱歉，暂未找到完全匹配的FAQ解答。</div>
                        <div style="margin-top:8px;color:#666;font-size:13px;">
                            建议尝试以下关键词：<br>
                            UKey、证书下载、一键修复、忘记密码、控件加载、浏览器配置
                        </div>
                    `);
                }
            }, 500);
        }

        // ================================================================
        //  8. 事件绑定
        // ================================================================
        sendBtn.addEventListener('click', () => {
            handleUserMessage(userInput.value);
        });

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleUserMessage(userInput.value);
            }
        });

        // ================================================================
        //  9. 初始化
        // ================================================================
        console.log('✅ 信保通电子签名智能客服已启动（21个FAQ，短标签）');
    </script>
